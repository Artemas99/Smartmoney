# fly.toml - FinTrack Backend API
# Taruh file ini di folder: backend/

app            = "smartmoney-api"   # ganti jika nama sudah dipakai
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
