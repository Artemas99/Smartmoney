name: Deploy FinTrack

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    name: Deploy Frontend → GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-backend:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy backend
        run: railway up --service fintrack-backend
        working-directory: backend/
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-bot:
    name: Deploy Bot → Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy bot
        run: railway up --service fintrack-bot
        working-directory: telegram-bot/
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
